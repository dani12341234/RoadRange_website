<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road Range</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f11;
  --panel: #17171a;
  --panel2: #1e1e23;
  --border: rgba(255,255,255,0.07);
  --text: #e8e6e0;
  --muted: #7a7870;
  --accent: oklch(72% 0.18 48);
  --accent2: oklch(72% 0.18 185);
  --danger: oklch(65% 0.18 15);
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
}

:root.light {
  --bg: #f0ede8;
  --panel: #faf8f5;
  --panel2: #f0ede8;
  --border: rgba(0,0,0,0.09);
  --text: #1a1916;
  --muted: #8a8680;
  --accent: oklch(58% 0.18 48);
  --accent2: oklch(52% 0.18 185);
  --danger: oklch(52% 0.18 15);
  --shadow: 0 2px 12px rgba(0,0,0,0.1);
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }

#app { display: flex; height: 100vh; width: 100vw; }

/* ── SIDEBAR ──────────────────────────────── */
#sidebar {
  width: 320px; min-width: 320px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 1000; overflow: hidden;
}

.s-header { padding: 24px 22px 18px; border-bottom: 1px solid var(--border); }
.s-logo { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
.s-title { font-size: 20px; font-weight: 600; }
.s-sub { font-size: 12px; color: var(--muted); margin-top: 3px; font-weight: 300; }

.s-body { flex: 1; overflow-y: auto; padding: 18px 22px; display: flex; flex-direction: column; gap: 18px; }
.s-body::-webkit-scrollbar { width: 3px; }
.s-body::-webkit-scrollbar-thumb { background: var(--border); }

/* ── FIELDS ───────────────────────────────── */
.field-label { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }

.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; background: var(--panel2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-family: var(--font);
  font-size: 13px; padding: 10px 36px 10px 12px; outline: none; transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.search-btn {
  position: absolute; right: 9px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--muted);
  padding: 4px; display: flex; align-items: center; transition: color 0.2s;
}
.search-btn:hover { color: var(--accent); }
.search-results {
  position: absolute; top: calc(100% + 5px); left: 0; right: 0;
  background: var(--panel2); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; z-index: 9999;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.sri { padding: 9px 12px; font-size: 12px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.12s; }
.sri:last-child { border-bottom: none; }
.sri:hover { background: rgba(255,255,255,0.04); }
.sri .pn { color: var(--text); }
.sri .pd { font-size: 10px; color: var(--muted); margin-top: 1px; }

/* ── SLIDER ───────────────────────────────── */
.km-display { display: flex; align-items: baseline; gap: 5px; margin-bottom: 10px; }
.km-number { font-family: var(--mono); font-size: 44px; font-weight: 300; color: var(--accent); line-height: 1; }
.km-unit { font-size: 14px; color: var(--muted); font-weight: 300; }
input[type=range] {
  -webkit-appearance: none; width: 100%; height: 3px;
  background: var(--panel2); border-radius: 2px; outline: none; cursor: pointer; border: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: var(--accent); cursor: pointer;
  box-shadow: 0 0 0 3px rgba(0,0,0,0.5); transition: transform 0.15s;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
.km-presets { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
.km-preset {
  background: var(--panel2); border: 1px solid var(--border);
  color: var(--muted); font-family: var(--mono); font-size: 10px;
  padding: 4px 9px; border-radius: 5px; cursor: pointer; transition: all 0.12s;
}
.km-preset:hover, .km-preset.active { border-color: var(--accent); color: var(--accent); background: rgba(200,140,60,0.07); }

/* ── TRAVEL MODE ──────────────────────────── */
.mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
.mode-btn {
  background: var(--panel2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 9px 5px; cursor: pointer; text-align: center; transition: all 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.mode-btn.active { border-color: var(--accent2); background: rgba(60,180,160,0.07); }
.mode-icon { font-size: 17px; }
.mode-label { font-size: 10px; color: var(--muted); }
.mode-btn.active .mode-label { color: var(--accent2); }

/* ── METRICS ──────────────────────────────── */
.metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
.metric {
  background: var(--panel2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 10px 10px 9px; text-align: center;
}
.metric-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
.metric-val { font-family: var(--mono); font-size: 18px; font-weight: 400; color: var(--text); }
.metric-val.cyan { color: var(--accent2); }
.metric-val.amber { color: var(--accent); }

/* ── STATUS ───────────────────────────────── */
.status-bar {
  background: var(--panel2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 9px 12px; font-size: 12px; color: var(--muted);
  display: flex; align-items: center; gap: 7px; min-height: 38px;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: var(--muted); }
.status-dot.ready { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
.status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
.status-dot.error { background: var(--danger); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.progress-bar {
  height: 2px; background: var(--panel2); border-radius: 1px; overflow: hidden; margin-top: -6px;
}
.progress-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width 0.3s; width: 0%; }

/* ── GO BUTTON ────────────────────────────── */
.go-btn {
  width: 100%; padding: 13px; background: var(--accent); border: none; border-radius: var(--radius);
  cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600;
  color: #1a1000; letter-spacing: 0.04em; transition: all 0.2s; position: relative; overflow: hidden;
}
.go-btn:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200,140,60,0.3); }
.go-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.go-btn.loading::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
  animation: shimmer 1.2s infinite;
}
@keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

.info-note {
  display: flex; align-items: flex-start; gap: 8px;
  background: var(--panel2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 10px 12px; font-size: 11px; color: var(--muted); line-height: 1.5;
}

/* ── MAP ──────────────────────────────────── */
#map-wrap { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

.map-hint {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(15,15,17,0.8); backdrop-filter: blur(8px);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 22px; font-size: 14px; color: var(--muted);
  pointer-events: none; z-index: 900; text-align: center; line-height: 1.6;
}

.clear-btn {
  position: absolute; top: 14px; right: 14px;
  background: rgba(15,15,17,0.85); backdrop-filter: blur(8px);
  border: 1px solid var(--border); border-radius: 7px;
  color: var(--muted); font-family: var(--font); font-size: 11px;
  padding: 6px 12px; cursor: pointer; display: none; z-index: 900; transition: all 0.15s;
}
.clear-btn:hover { color: var(--danger); border-color: var(--danger); }

/* ── LEAFLET ──────────────────────────────── */
.leaflet-container { background: #080809; }
.light .leaflet-container { background: #e8e4dc; }
.light .leaflet-control-zoom a { background: rgba(250,248,245,0.95) !important; color: var(--text) !important; }
.light .leaflet-control-attribution { background: rgba(240,237,232,0.85) !important; }
.leaflet-control-zoom { border: 1px solid var(--border) !important; box-shadow: none !important; }
.leaflet-control-zoom a { background: rgba(15,15,17,0.9) !important; color: var(--text) !important; border-bottom: 1px solid var(--border) !important; }
.leaflet-control-zoom a:hover { background: var(--panel2) !important; }
.leaflet-control-attribution { background: rgba(15,15,17,0.7) !important; color: var(--muted) !important; font-size: 9px !important; }
.leaflet-control-attribution a { color: var(--muted) !important; }

.city-label { font-size: 10px; font-weight: 500; font-family: 'DM Sans', sans-serif; color: #e8e6e0; text-shadow: 0 1px 3px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.7); white-space: nowrap; pointer-events: none; }
.city-label.reachable { color: oklch(72% 0.18 185) !important; font-weight: 600; }
.city-label.dim { color: #5a5855 !important; }
.light .city-label { color: #2a2724; text-shadow: 0 1px 2px rgba(255,255,255,0.8); }
.light .city-label.reachable { color: oklch(42% 0.18 185) !important; }
.light .city-label.dim { color: #b0aba6 !important; }
.leaflet-tooltip { background: none !important; border: none !important; box-shadow: none !important; padding: 0 !important; }
.leaflet-tooltip::before { display: none !important; }

/* ── TWEAKS ───────────────────────────────── */
#tweaks-panel {
  display: none; position: fixed; bottom: 22px; left: 338px;
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 18px; z-index: 2000; width: 240px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#tweaks-panel h3 { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; font-weight: 500; }
.tweak-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.tweak-row label { font-size: 11px; color: var(--text); }
.tweak-row input[type=color] { width: 26px; height: 26px; border-radius: 5px; border: 1px solid var(--border); cursor: pointer; background: none; padding: 2px; }
.tweak-row select { background: var(--panel2); border: 1px solid var(--border); color: var(--text); border-radius: 5px; font-size: 11px; padding: 3px 7px; outline: none; cursor: pointer; }
.tweak-row input[type=range] { width: 90px; }
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="s-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div class="s-logo">Road Range</div>
          <div class="s-title">Reachability Map</div>
          <div class="s-sub">Where can you get to from here?</div>
        </div>
        <button id="theme-toggle" title="Toggle light/dark" style="background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:7px 9px;cursor:pointer;color:var(--muted);display:flex;align-items:center;transition:all 0.2s;flex-shrink:0;margin-top:2px;">
          <svg id="theme-icon-dark" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="theme-icon-light" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
    <div class="s-body">

      <div>
        <div class="field-label">Starting point</div>
        <div class="search-wrap" id="search-wrap">
          <input type="text" id="search-input" placeholder="Search a place…" autocomplete="off">
          <button class="search-btn" id="search-btn">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          </button>
          <div class="search-results" id="search-results" style="display:none"></div>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-top:5px;">Or click anywhere on the map</div>
      </div>

      <div>
        <div class="field-label">Maximum distance</div>
        <div class="km-display">
          <input id="km-display" type="number" min="1" max="3000" value="200" style="font-family:var(--mono);font-size:44px;font-weight:300;color:var(--accent);line-height:1;background:none;border:none;outline:none;width:130px;padding:0;-moz-appearance:textfield;">
          <span class="km-unit">km</span>
        </div>
        <input type="range" id="km-slider" min="1" max="3000" value="200" step="1">
        <div class="km-presets">
          <button class="km-preset" data-km="50">50</button>
          <button class="km-preset" data-km="100">100</button>
          <button class="km-preset active" data-km="200">200</button>
          <button class="km-preset" data-km="500">500</button>
          <button class="km-preset" data-km="1000">1000</button>
          <button class="km-preset" data-km="2000">2000</button>
        </div>
      </div>

      <div>
        <div class="field-label">Travel mode</div>
        <div class="mode-grid">
          <button class="mode-btn active" data-mode="driving-car" data-osrm="driving">
            <span class="mode-icon">🚗</span><span class="mode-label">Car</span>
          </button>
          <button class="mode-btn" data-mode="cycling-regular" data-osrm="cycling">
            <span class="mode-icon">🚴</span><span class="mode-label">Cycling</span>
          </button>
          <button class="mode-btn" data-mode="foot-walking" data-osrm="foot">
            <span class="mode-icon">🚶</span><span class="mode-label">Walking</span>
          </button>
        </div>
      </div>

      <div>
        <div class="field-label">Summary</div>
        <div class="metrics">
          <div class="metric">
            <div class="metric-label">Cities</div>
            <div class="metric-val cyan" id="m-cities">—</div>
          </div>
          <div class="metric">
            <div class="metric-label">Farthest</div>
            <div class="metric-val amber" id="m-farthest">—</div>
          </div>
          <div class="metric">
            <div class="metric-label">Drive time</div>
            <div class="metric-val" id="m-time">—</div>
          </div>
        </div>
      </div>

      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

      <div class="status-bar" id="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Set a starting point to begin</span>
      </div>

      <button class="go-btn" id="go-btn" disabled>Calculate Reachable Area</button>



    </div>
  </div>

  <!-- MAP -->
  <div id="map-wrap">
    <div id="map"></div>
    <div class="map-hint" id="map-hint">Click to place your starting point</div>
    <button class="clear-btn" id="clear-btn">✕ Clear</button>
  </div>
</div>

<!-- TWEAKS -->
<div id="tweaks-panel">
  <h3>Tweaks</h3>
  <div class="tweak-row"><label>Fill color</label><input type="color" id="tw-fill" value="#f09a38"></div>
  <div class="tweak-row"><label>Fill opacity</label><input type="range" id="tw-opacity" min="0.02" max="0.4" step="0.01" value="0.08"></div>
  <div class="tweak-row"><label>Map style</label>
    <select id="tw-map-style"><option value="dark">Dark</option><option value="topo">Topo</option><option value="satellite">Satellite</option></select>
  </div>
  <div class="tweak-row"><label>Route lines</label>
    <select id="tw-routes"><option value="1">Show</option><option value="0">Hide</option></select>
  </div>
</div>

// ── CITY MARKERS ───────────────────────────────────────────────────────────
function dotIcon(color, size) {
  return L.divIcon({ className:'', html:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:1.5px solid rgba(255,255,255,0.5);box-shadow:0 0 5px rgba(0,0,0,0.6);"></div>`, iconSize:[size+3,size+3], iconAnchor:[(size+3)/2,(size+3)/2] });
}
const DIM_COLOR = () => isLight ? '#c0bbb6' : '#3a3835';
const REACH_COLOR = () => isLight ? 'oklch(42% 0.18 185)' : 'oklch(72% 0.18 185)';

cities.forEach((c, i) => {
  const m = L.marker([c.lat, c.lng], { icon: dotIcon(DIM_COLOR(), c.t<=2?8:5), interactive:false, zIndexOffset:100-c.t*20 });
  const tip = L.tooltip({ permanent:true, direction:'right', offset:[7,0], className:'city-label dim', interactive:false });
  tip.setContent(c.n);
  m.bindTooltip(tip);
  cityMarkers.push(m);
});

function tierForZoom(z) {
  if (z >= 11) return 5;
  if (z >= 9)  return 4;
  if (z >= 8)  return 3;
  if (z >= 7)  return 2;
  return 1;
}

function dotSizeForTier(t, z) {
  const base = t <= 1 ? 8 : t <= 2 ? 6 : t <= 3 ? 5 : t <= 4 ? 4 : 3;
  return base;
}

function updateCityVisibility() {
  const z = map.getZoom();
  const maxTier = tierForZoom(z);
  const dist = parseFloat(document.getElementById('km-slider').value);
  const hasData = Object.keys(routeData.d).length > 0;

  cities.forEach((c, i) => {
    const m = cityMarkers[i];
    const rd = routeData.d[i];
    const reachable = startLatLng && hasData && rd > 0 && rd <= dist;

    // Reachable cities: farthest ones visible at low zoom, closer ones need zoom
    let effectiveTier = c.t;
    if (reachable) {
      const ratio = rd / dist; // 0=near, 1=far
      if (ratio > 0.75) effectiveTier = 1;
      else if (ratio > 0.5) effectiveTier = 2;
      else if (ratio > 0.25) effectiveTier = 3;
      else effectiveTier = 4;
    }
    const visible = effectiveTier <= maxTier;

    if (visible) {
      if (!map.hasLayer(m)) m.addTo(map);
      if (reachable) {
        const rt = routeData.t[i] || 0;
        const h = Math.floor(rt/60), mn = rt%60;
        m.setTooltipContent(`${c.n}  ${rd} km · ${h}h${mn>0?mn+'m':''}`);
        m.setIcon(dotIcon(REACH_COLOR(), c.t<=2?10:7));
        m.setZIndexOffset(300);
        const el = m.getTooltip()?.getElement();
        if (el) {
          el.className = 'leaflet-tooltip city-label reachable';
          el.style.display = z >= 6 ? '' : 'none';
        }
      } else {
        m.setTooltipContent(c.n);
        m.setIcon(dotIcon(DIM_COLOR(), c.t<=2?8:5));
        m.setZIndexOffset(100-c.t*20);
        const el = m.getTooltip()?.getElement();
        if (el) {
          el.className = 'leaflet-tooltip city-label dim';
          el.style.display = z >= 7 ? '' : 'none';
        }
      }
    } else {
      if (map.hasLayer(m)) map.removeLayer(m);
    }
  });
}

map.on('zoomend', updateCityVisibility);
updateCityVisibility();

async function doSearch(q) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5`, { headers:{'Accept-Language':'en'} });
    const data = await res.json();
    if (!data.length) { searchResults.style.display = 'none'; return; }

      <div class="sri" data-lat="${r.lat}" data-lon="${r.lon}">
        <div class="pn">${r.display_name.split(',')[0]}</div>
        <div class="pd">${r.display_name.split(',').slice(1,3).join(',').trim()}</div>
      </div>`).join('');
    searchResults.style.display = 'block';
    searchResults.querySelectorAll('.sri').forEach(item => {
      item.addEventListener('click', () => {
        const latlng = L.latLng(parseFloat(item.dataset.lat), parseFloat(item.dataset.lon));
        map.setView(latlng, 9);
        placeMarker(latlng);
        searchResults.style.display = 'none';
        searchInput.value = item.querySelector('.pn').textContent;

async function runCalculation() {
  if (!startLatLng) return;
  const btn = document.getElementById('go-btn');
  btn.classList.add('loading'); btn.disabled = true;
  clearVisuals();
  setProgress(0);

  const km = parseFloat(slider.value);

  // Step 1: Isochrone (Valhalla ≤150km, circle beyond)
  setStatus('loading', 'Drawing reachable area…');
  if (km <= 150) {
    await fetchIsochrone(km);
  }
  setProgress(25);

  // Step 2: OSRM table for city distances
  setStatus('loading', 'Fetching city distances…');
  await fetchOSRMTable();
  setProgress(70);
  updateMetrics();
  updateCityVisibility();

  // Step 3: Route geometries
  setStatus('loading', 'Tracing routes…');
  await fetchRouteGeometries(km);
  setProgress(100);

  setStatus('ready', `Reachable within ${km} km`);
  document.getElementById('clear-btn').style.display = 'block';
  btn.classList.remove('loading');
  btn.disabled = false;
  setTimeout(() => setProgress(0), 800);
}

// ── ISOCHRONE ─────────────────────────────────────────────────────────────
const valhallaCosting = { 'driving-car':'auto', 'cycling-regular':'bicycle', 'foot-walking':'pedestrian' };

async function fetchIsochrone(km) {
  try {
    const steps = Math.min(4, km >= 20 ? 4 : 3);
    const contours = Array.from({length:steps}, (_,i) => ({ distance: Math.round(km*(i+1)/steps*10)/10 }));
    const body = { locations:[{lon:startLatLng.lng,lat:startLatLng.lat}], costing:valhallaCosting[travelMode]||'auto', contours, polygons:true, denoise:0.5, generalize:150 };
    const res = await fetch('https://valhalla1.openstreetmap.de/isochrone', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if (!res.ok) throw new Error('Valhalla error');
    const geojson = await res.json();
    renderIsochrone(geojson);
  } catch(e) {
    // Fallback to circle
    renderCircle(km);
  }
}

function renderIsochrone(geojson) {
  const features = (geojson.features || []).sort((a,b) => (b.properties?.contour||0)-(a.properties?.contour||0));
  if (!features.length) return;
  let allBounds = null;
  features.forEach((feat, idx) => {
    const t = features.length > 1 ? idx / (features.length-1) : 0;
    const layer = L.geoJSON(feat, { style:{ fillColor:tweaks.fillColor, fillOpacity:tweaks.fillOpacity*(0.3+0.7*(1-t)), color:tweaks.fillColor, weight:idx===0?2:0.5, opacity:idx===0?0.8:0.2 } }).addTo(map);
    try { const b = layer.getBounds(); if(b.isValid()) allBounds = allBounds ? allBounds.extend(b) : b; } catch(e){}
    if (idx===0) isoLayer = layer; else ringLayers.push(layer);
  });
  if (allBounds?.isValid()) map.fitBounds(allBounds, {padding:[40,40]});
}

function renderCircle(km) {
  isoLayer = L.circle(startLatLng, { radius:km*1000, fillColor:tweaks.fillColor, fillOpacity:tweaks.fillOpacity, color:tweaks.fillColor, weight:2, opacity:0.8 }).addTo(map);
  const b = isoLayer.getBounds();
  if (b.isValid()) map.fitBounds(b, {padding:[40,40]});
}

// ── OSRM TABLE ────────────────────────────────────────────────────────────
async function fetchOSRMTable() {
  if (abortCtrl) abortCtrl.abort();
  abortCtrl = new AbortController();
  routeData = { d:{}, t:{}, g:{} };
  try {
    const coords = `${startLatLng.lng},${startLatLng.lat};` + cities.map(c=>`${c.lng},${c.lat}`).join(';');
    const res = await fetch(`https://router.project-osrm.org/table/v1/${osrmProfile}/${coords}?sources=0&annotations=distance,duration`, { signal:abortCtrl.signal });
    const data = await res.json();
    if (data.code === 'Ok') {
      cities.forEach((_,i) => {
        routeData.d[i] = Math.round((data.distances[0][i+1]||0)/1000);
        routeData.t[i] = Math.round((data.durations[0][i+1]||0)/60);
      });
    }
  } catch(e) { /* ignore abort */ }
}

// ── POLYLINE DECODE ───────────────────────────────────────────────────────
function decodePoly(str) {
  let i=0,lat=0,lng=0; const c=[];
  while(i<str.length){
    let b,s=0,r=0; do{b=str.charCodeAt(i++)-63;r|=(b&31)<<s;s+=5}while(b>=32);
    lat+=r&1?~(r>>1):r>>1; s=0;r=0;
    do{b=str.charCodeAt(i++)-63;r|=(b&31)<<s;s+=5}while(b>=32);
    lng+=r&1?~(r>>1):r>>1; c.push([lat/1e5,lng/1e5]);
  }
  return c;
}

// ── ROUTE GEOMETRIES ──────────────────────────────────────────────────────
async function fetchRouteGeometries(km) {
  if (!tweaks.showRoutes) return;
  const sig = abortCtrl?.signal;
  const reachable = cities.map((c,i)=>({i,d:routeData.d[i]||Infinity}))
    .filter(x=>x.d<=km&&x.d>0).sort((a,b)=>a.d-b.d);

  for (let b=0; b<reachable.length; b+=6) {
    const chunk = reachable.slice(b, b+6);
    await Promise.all(chunk.map(async r => {
      try {
        const c = cities[r.i];
        const res = await fetch(`https://router.project-osrm.org/route/v1/${osrmProfile}/${startLatLng.lng},${startLatLng.lat};${c.lng},${c.lat}?overview=full&geometries=polyline`, { signal:sig });
        const data = await res.json();
        if (data.code==='Ok' && data.routes[0]) {
          routeData.g[r.i] = decodePoly(data.routes[0].geometry);
          routeData.d[r.i] = Math.round(data.routes[0].distance/1000);
          routeData.t[r.i] = Math.round(data.routes[0].duration/60);
        }
      } catch(e) { if(e?.name==='AbortError') throw e; }
    })).catch(()=>{});
    drawRoutes();
    updateMetrics();
    updateCityVisibility();
    await new Promise(r=>setTimeout(r,60));
  }
}

// ── CONVEX HULL (Gift Wrapping) ───────────────────────────────────────────
function convexHull(pts) {
  if (pts.length < 3) return pts;
  const cross = (o,a,b) => (a[1]-o[1])*(b[0]-o[0]) - (a[0]-o[0])*(b[1]-o[1]);
  const sorted = pts.slice().sort((a,b) => a[1]!==b[1] ? a[1]-b[1] : a[0]-b[0]);
  const lower = [], upper = [];
  for (const p of sorted) {
    while (lower.length>=2 && cross(lower[lower.length-2],lower[lower.length-1],p)<=0) lower.pop();
    lower.push(p);
  }
  for (const p of sorted.slice().reverse()) {
    while (upper.length>=2 && cross(upper[upper.length-2],upper[upper.length-1],p)<=0) upper.pop();
    upper.push(p);
  }
  upper.pop(); lower.pop();
  return lower.concat(upper);
}

// ── DRAW ROUTES ───────────────────────────────────────────────────────────
function drawRoutes() {
  routeLines.forEach(l=>map.removeLayer(l));
  routeLines=[];
  if (!tweaks.showRoutes) return;
  const dist = parseFloat(slider.value);
  Object.keys(routeData.g).forEach(idx => {
    const d = routeData.d[idx]||Infinity, geo = routeData.g[idx];
    if (!geo||geo.length<2) return;
    const reachable = d <= dist;
    const glowColor = reachable ? tweaks.fillColor : '#3a3835';
    const lineColor = reachable ? tweaks.fillColor : '#3a3835';
    const glow = L.polyline(geo, { color:glowColor, weight:reachable?8:3, opacity:reachable?0.12:0.05, interactive:false }).addTo(map);
    const line = L.polyline(geo, { color:lineColor, weight:reachable?2:1, opacity:reachable?0.65:0.12, interactive:false }).addTo(map);
    routeLines.push(glow, line);
  });
}

// ── METRICS ───────────────────────────────────────────────────────────────
function updateMetrics() {
  const dist = parseFloat(slider.value);
  const hasData = Object.keys(routeData.d).length > 0;
  if (!startLatLng || !hasData) { ['m-cities','m-farthest','m-time'].forEach(id=>{document.getElementById(id).textContent='—';}); return; }
  let count=0, farthestTime=0, farthestDist=0;
  cities.forEach((_,i) => {
    const d=routeData.d[i]||Infinity, t=routeData.t[i]||0;
    if(d<=dist&&d>0){count++;if(t>farthestTime){farthestTime=t;farthestDist=d;}}
  });
  document.getElementById('m-cities').textContent = count || '—';
  document.getElementById('m-farthest').textContent = farthestDist ? farthestDist+' km' : '—';
  if (farthestTime > 0) {
    const h=Math.floor(farthestTime/60),m=farthestTime%60;
    document.getElementById('m-time').textContent = `${h}h${m>0?' '+m+'m':''}`;
  } else {
    document.getElementById('m-time').textContent = '—';
  }

  // Draw convex hull around reachable city positions
  if (rangeCircle) { map.removeLayer(rangeCircle); rangeCircle=null; }
  if (count > 0 && startLatLng) {
    const pts = [];
    cities.forEach((_,i) => {
      const d=routeData.d[i]||Infinity;
      if(d<=dist&&d>0) pts.push([cities[i].lat, cities[i].lng]);
    });
    pts.push([startLatLng.lat, startLatLng.lng]);
    if (pts.length >= 3) {
      const hull = convexHull(pts);
      rangeCircle = L.polygon(hull, {
        fill: false,
        color: tweaks.fillColor,
        weight: 1.5,
        opacity: 0.45,
        dashArray: '6 6',
        interactive: false,
        smoothFactor: 2
      }).addTo(map);
    }
  }
}

// ── CLEAR ────────────────────────────────────────────────────────────────
function clearVisuals() {
  if (isoLayer) { map.removeLayer(isoLayer); isoLayer=null; }
  ringLayers.forEach(l=>map.removeLayer(l)); ringLayers=[];
  routeLines.forEach(l=>map.removeLayer(l)); routeLines=[];
  if (rangeCircle) { map.removeLayer(rangeCircle); rangeCircle=null; }
}

document.getElementById('clear-btn').addEventListener('click', () => {
  clearVisuals();
  if (startMarker) { map.removeLayer(startMarker); startMarker=null; }
  startLatLng=null;
  routeData={d:{},t:{},g:{}};
  document.getElementById('clear-btn').style.display='none';
  document.getElementById('map-hint').style.display='block';
  document.getElementById('go-btn').disabled=true;
  setStatus('','Set a starting point to begin');
  updateMetrics();
  updateCityVisibility();
});

// ── TWEAKS ────────────────────────────────────────────────────────────────
window.addEventListener('message', e => {
  if (e.data?.type==='__activate_edit_mode') document.getElementById('tweaks-panel').style.display='block';
  else if (e.data?.type==='__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display='none';
});
window.parent.postMessage({type:'__edit_mode_available'},'*');

document.getElementById('tw-fill').addEventListener('input', function() {
  tweaks.fillColor=this.value; applyTweakStyle();
  window.parent.postMessage({type:'__edit_mode_set_keys',edits:{fillColor:this.value}},'*');
});
document.getElementById('tw-opacity').addEventListener('input', function() {
  tweaks.fillOpacity=parseFloat(this.value); applyTweakStyle();
  window.parent.postMessage({type:'__edit_mode_set_keys',edits:{fillOpacity:tweaks.fillOpacity}},'*');
});
document.getElementById('tw-map-style').addEventListener('change', function() {
  tweaks.mapStyle=this.value;
  map.removeLayer(currentTile); currentTile=tileLayers[tweaks.mapStyle]||tileLayers.dark; currentTile.addTo(map);
  window.parent.postMessage({type:'__edit_mode_set_keys',edits:{mapStyle:this.value}},'*');
});
document.getElementById('tw-routes').addEventListener('change', function() {
  tweaks.showRoutes=this.value==='1'; drawRoutes();
  window.parent.postMessage({type:'__edit_mode_set_keys',edits:{showRoutes:tweaks.showRoutes}},'*');
});
function applyTweakStyle() {
  [isoLayer,...ringLayers].forEach(l=>{if(l&&l.setStyle)l.setStyle({fillColor:tweaks.fillColor,color:tweaks.fillColor,fillOpacity:tweaks.fillOpacity});});
  drawRoutes();
}

// ── THEME TOGGLE ──────────────────────────────────────────────────────────
const lightTiles = {
  light: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution:'© OpenStreetMap © CARTO', maxZoom:19 }),
  topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap, SRTM © OpenTopoMap', maxZoom:17 }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'© Esri', maxZoom:19 })
};


function applyTheme() {
  document.documentElement.classList.toggle('light', isLight);
  document.getElementById('theme-icon-dark').style.display = isLight ? 'none' : 'block';
  document.getElementById('theme-icon-light').style.display = isLight ? 'block' : 'none';
  // Swap tile layer
  map.removeLayer(currentTile);
  if (isLight) {
    currentTile = lightTiles[tweaks.mapStyle] || lightTiles.light;
  } else {
    currentTile = tileLayers[tweaks.mapStyle] || tileLayers.dark;
  }
  currentTile.addTo(map);
  localStorage.setItem('rr_theme', isLight ? 'light' : 'dark');
  updateCityVisibility();
}
applyTheme();

document.getElementById('theme-toggle').addEventListener('click', () => {
  isLight = !isLight;
  applyTheme();
});

// Init tweak controls
document.getElementById('tw-fill').value=TWEAK_DEFAULTS.fillColor;
document.getElementById('tw-opacity').value=TWEAK_DEFAULTS.fillOpacity;
document.getElementById('tw-map-style').value=TWEAK_DEFAULTS.mapStyle;
document.getElementById('tw-routes').value=TWEAK_DEFAULTS.showRoutes?'1':'0';

// Default address
(async () => {
  try {
    const res = await fetch('https://nominatim.openstreetmap.org/search?q=Jegenye+fasor+15+Budapest+1184&format=json&limit=1', {headers:{'Accept-Language':'en'}});
    const data = await res.json();
    if (data[0]) {
      const latlng = L.latLng(parseFloat(data[0].lat), parseFloat(data[0].lon));
      map.setView(latlng, 11);
      placeMarker(latlng);
      searchInput.value = 'Jegenye fasor 15, Budapest 1184';
      runCalculation();
    }
  } catch(e) {}
})();
</script>
